# AS 網格交易系統 - Terminal TUI 模式
#
# 使用方式:
#   首次啟動/日常使用 (互動模式):
#     docker compose -f docker-compose.terminal.yml run --rm as-grid
#
#   斷開但保持運行: Ctrl+P, Ctrl+Q
#   重新接回:        docker attach as-grid
#   停止:            docker compose -f docker-compose.terminal.yml down
#
# 注意: 使用 run 而非 up，因為 up 不會轉發 stdin，TUI 無法互動

services:
  as-grid:
    build:
      context: .
      dockerfile: Dockerfile.terminal
    container_name: as-grid
    stdin_open: true
    tty: true
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./log:/app/log
    environment:
      - TZ=Asia/Taipei
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
